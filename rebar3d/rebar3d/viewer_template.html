<title>__TITLE__</title>
<style>
  html, body { margin:0; height:100%; overflow:hidden; background:#15181d; color:#dde1e6;
    font: 13px/1.45 -apple-system, "Segoe UI", sans-serif; }
  #app { display:grid; grid-template-columns:300px 1fr 350px; grid-template-rows:auto 1fr;
    height:100%; gap:0; }
  #panelbar { grid-column:1/4; grid-row:1; display:flex; gap:6px; flex-wrap:wrap; align-items:center;
    padding:8px 10px; background:#1a1e25; border-bottom:1px solid #3a414d; }
  #panelbar button { background:#262b33; color:#dde1e6; border:1px solid #3a414d; border-radius:6px;
    padding:5px 12px; cursor:pointer; }
  #panelbar button.on { background:#3d6fd0; border-color:#3d6fd0; color:#fff; }
  #hud { grid-column:1; grid-row:2; background:#1a1e25; border-right:1px solid #3a414d;
    padding:12px 14px; overflow-y:auto; }
  #hud .sw { display:inline-block; width:11px; height:11px; border-radius:2px; margin-right:6px; vertical-align:-1px; }
  #hud label { display:block; cursor:pointer; margin:1px 0; }
  .dim { color:#8a919d; }
  h1 { font-size:13px; margin:0 0 6px; }
  #viewport { grid-column:2; grid-row:2; position:relative; min-width:0; min-height:0; }
  #c { display:block; width:100%; height:100%; }
  #rightcol { grid-column:3; grid-row:2; display:flex; flex-direction:column; gap:0;
    background:#1a1e25; border-left:1px solid #3a414d; overflow-y:auto; }
  #tools { padding:12px 14px; border-bottom:1px solid #3a414d; }
  #tools input { width:64px; background:#262b33; color:#dde1e6; border:1px solid #3a414d;
    border-radius:5px; padding:3px 6px; }
  #tools button { background:#262b33; color:#dde1e6; border:1px solid #3a414d; border-radius:6px;
    padding:4px 10px; cursor:pointer; margin-left:4px; }
  #tools button.primary { background:#3d6fd0; border-color:#3d6fd0; color:#fff; }
  #schedule { padding:12px 14px; }
  #schedule h1 { text-align:center; }
  #schedule table { border-collapse:collapse; font-size:12px; margin:0 auto; }
  #schedule th, #schedule td { border:1px solid #3a414d; padding:3px 9px; text-align:right; }
  #schedule th { color:#8a919d; font-weight:600; }
  #schedule td:first-child { text-align:left; }
  #schedule tr.total td { font-weight:700; border-top:2px solid #5c6470; }
  #schedule .delta-up { color:#e15759; }
  #schedule .delta-down { color:#2ecc71; }
</style>
<div id="app">
  <div id="panelbar"></div>
  <div id="hud">
    <h1 id="hd"></h1>
    <div id="legend"></div>
    <div id="toggles"></div>
    <div id="families" style="margin-top:6px"></div>
    <div id="measure" style="margin-top:6px; color:#7ec8ff"></div>
    <div class="dim" style="margin-top:6px">drag: orbit · shift-drag: pan · wheel: zoom<br>click a bar, then a second bar: distance</div>
  </div>
  <div id="viewport"><canvas id="c"></canvas></div>
  <div id="rightcol">
    <div id="tools">
      <b>resize</b>
      <input id="w2" type="number" step="10"> × <input id="h2" type="number" step="10"> mm
      <button id="applyBtn" class="primary">apply</button><button id="resetBtn">reset</button>
      <div style="margin-top:7px; text-align:right">
        <button id="dxfBtn">&#8595; DXF</button><button id="repBtn">&#8595; report</button><button id="bbsBtn">&#8595; BBS pdf</button>
      </div>
      <div class="dim" id="dlNote" style="margin-top:4px; text-align:right"></div>
    </div>
    <div id="schedule"></div>
  </div>
</div>
<script>__THREE_JS__</script>
<script>
"use strict";
const MODELS = __MODELS__;
const DIA_COLORS = {6:0xb0b0b0,8:0xe15759,10:0xf28e2b,12:0x59a14f,16:0xaf7aa1,20:0x4e79a7,25:0x9c755f,32:0xe377c2};
const CONCRETE_DENSITY = 2500; // kg/m³, matches the sheet weight schedules

const canvas = document.getElementById("c");
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x15181d);
const camera = new THREE.PerspectiveCamera(45, 2, 1, 100000);
scene.add(new THREE.AmbientLight(0xffffff, 0.75));
const dl = new THREE.DirectionalLight(0xffffff, 1.2); dl.position.set(1, 2, 1.5); scene.add(dl);
const dl2 = new THREE.DirectionalLight(0xffffff, 0.5); dl2.position.set(-1.5, -1, -1); scene.add(dl2);

// ---- minimal orbit control
let target = new THREE.Vector3(), sph = {r: 6000, th: 0.9, ph: 1.15};
function applyCam() {
  camera.position.set(
    target.x + sph.r * Math.sin(sph.ph) * Math.cos(sph.th),
    target.y + sph.r * Math.cos(sph.ph),
    target.z + sph.r * Math.sin(sph.ph) * Math.sin(sph.th));
  camera.lookAt(target);
}
let drag = null;
canvas.addEventListener("pointerdown", e => { drag = {x:e.clientX, y:e.clientY, pan:e.shiftKey}; canvas.setPointerCapture(e.pointerId); });
canvas.addEventListener("pointermove", e => {
  if (!drag) return;
  const dx = e.clientX - drag.x, dy = e.clientY - drag.y;
  drag.x = e.clientX; drag.y = e.clientY;
  if (drag.pan) {
    const s = sph.r / 900;
    const right = new THREE.Vector3().subVectors(camera.position, target).cross(camera.up).normalize();
    target.addScaledVector(right, dx * s);
    target.addScaledVector(camera.up, dy * s);
  } else {
    sph.th += dx * 0.006;
    sph.ph = Math.min(Math.PI - 0.05, Math.max(0.05, sph.ph - dy * 0.006));
  }
  applyCam();
});
canvas.addEventListener("pointerup", () => drag = null);
canvas.addEventListener("wheel", e => { e.preventDefault(); sph.r *= Math.exp(e.deltaY * 0.001); applyCam(); }, {passive:false});

// ---- schedules & weights (unit weight = d²/162 kg/m)
// bars the drawing's own linework couldn't fully account for get topped up
// to match its printed Summary Schedule (z_src "calibrated") — kept in a
// separate toggle group, rendered translucent, so it's clear which bars are
// geometrically confirmed vs. inferred to make the total weight correct.
function groupKeyOf(b) {
  return b.z_src === "calibrated" ? b.kind + " (calibrated)" : b.kind;
}
function barLen(b) {
  let len = 0;
  for (let i = 0; i + 1 < b.pts.length; i++) {
    const a = b.pts[i], c = b.pts[i+1];
    len += Math.hypot(c[0]-a[0], c[1]-a[1], c[2]-a[2]);
  }
  return len;
}
function schedOf(m) {
  const g = {};
  for (const b of m.bars) {
    const s = g[b.d] || (g[b.d] = {n:0, len:0});
    s.n++; s.len += barLen(b);
  }
  const rows = []; let excluded = 0;
  for (const d of Object.keys(g).map(Number).sort((a,b)=>a-b)) {
    const s = g[d];
    if (s.n === 1) { excluded++; continue; }  // lone pairing — almost certainly a misdetected bar
    rows.push({d, n:s.n, len:s.len, w:(s.len/1000)*d*d/162});
  }
  return {rows, excluded,
    totN: rows.reduce((a,r)=>a+r.n,0),
    totL: rows.reduce((a,r)=>a+r.len,0),
    totW: rows.reduce((a,r)=>a+r.w,0)};
}
function openingsArea(m) {
  let area = 0;
  for (const lp of m.openings || []) {
    let s = 0;
    for (let i = 0; i < lp.length; i++) {
      const [x1,y1] = lp[i], [x2,y2] = lp[(i+1)%lp.length];
      s += x1*y2 - x2*y1;
    }
    area += Math.abs(s)/2;
  }
  return area;
}
function concreteOf(m) {
  const vol = (m.width*m.height - openingsArea(m)) * m.thickness / 1e9; // m³
  return {vol, wt: vol * CONCRETE_DENSITY};
}

// ---- parametric resize: scale outline/features, re-space mesh families
function resizeModel(m, W2, H2) {
  const sx = W2/m.width, sy = H2/m.height;
  const S = p => [p[0]*sx, p[1]*sy, p[2]];
  const bars = m.bars.map(b => Object.assign({}, b, {pts: b.pts.map(S)}));
  const out = [];
  const fam = {};
  for (const b of bars) {
    if (b.kind !== "v-mesh" && b.kind !== "h-mesh" && b.kind !== "u-bar" && b.kind !== "hook") { out.push(b); continue; }
    const xs = b.pts.map(p=>p[0]), ys = b.pts.map(p=>p[1]), zs = b.pts.map(p=>p[2]);
    // bars run along their long axis; the family distributes along the other
    const ax = (Math.max(...ys)-Math.min(...ys)) > (Math.max(...xs)-Math.min(...xs)) ? 0 : 1;
    // include the run extent in the key: bars in different bands (e.g. top
    // and bottom notch) can share a position and must stay separate families
    const rl = ax === 0 ? [Math.min(...ys), Math.max(...ys)] : [Math.min(...xs), Math.max(...xs)];
    const key = [b.kind, b.d, ax, Math.round(Math.min(...zs)/12), Math.round(Math.max(...zs)/12),
                 Math.round((rl[0]+rl[1])/2/250), Math.round((rl[1]-rl[0])/250)].join("|");
    b._pos = b.pts.reduce((a,p)=>a+p[ax],0) / b.pts.length;
    (fam[key] || (fam[key] = {ax, bars:[]})).bars.push(b);
  }
  for (const key in fam) {
    const {ax, bars: fb} = fam[key];
    const sAx = ax === 0 ? sx : sy;
    if (fb.length < 3) { out.push(...fb); continue; }
    fb.sort((a,b)=>a._pos-b._pos);
    // keep the ORIGINAL spacing: measure centre-to-centre in the unscaled frame
    const diffs = [];
    for (let i = 1; i < fb.length; i++) {
      const d = (fb[i]._pos - fb[i-1]._pos) / sAx;
      if (d > 10) diffs.push(d);
    }
    if (!diffs.length) { out.push(...fb); continue; }
    const med = a => { const s = [...a].sort((x,y)=>x-y); return s[Math.floor(s.length/2)]; };
    const gMed = med(diffs);
    // split into bands where the gap jumps (openings, or an end zone at a
    // tighter pitch than the field mesh)
    const bands = [[fb[0]]];
    for (let i = 1; i < fb.length; i++) {
      const d = (fb[i]._pos - fb[i-1]._pos) / sAx;
      const prev = bands[bands.length-1];
      const local = prev.length > 1
        ? (prev[prev.length-1]._pos - prev[0]._pos) / sAx / (prev.length-1) : gMed;
      if (d > 1.9*local && d > 1.4*gMed || d > 2.6*gMed) bands.push([]);
      bands[bands.length-1].push(fb[i]);
    }
    for (const band of bands) {
      const p0 = band[0]._pos, p1 = band[band.length-1]._pos;
      // spacing local to this band, so end zones keep their tighter pitch
      const bd = [];
      for (let i = 1; i < band.length; i++) {
        const d = (band[i]._pos - band[i-1]._pos) / sAx;
        if (d > 10) bd.push(d);
      }
      const spacing = bd.length ? med(bd) : gMed;
      if (band.length < 3 || p1 - p0 < spacing) { out.push(...band); continue; }
      // bar count so the real spacing stays ~constant over the scaled band
      const count = Math.max(2, Math.round((p1-p0)/spacing) + 1);
      for (let i = 0; i < count; i++) {
        const pos = p0 + (p1-p0)*i/(count-1);
        let t = band[0];
        for (const b of band) if (Math.abs(b._pos-pos) < Math.abs(t._pos-pos)) t = b;
        const off = pos - t._pos;
        out.push(Object.assign({}, t, {pts: t.pts.map(p => {
          const q = p.slice(); q[ax] += off; return q;
        })}));
      }
    }
  }
  for (const b of out) delete b._pos;
  return {
    name: m.name, width: W2, height: H2, thickness: m.thickness,
    openings: (m.openings||[]).map(lp => lp.map(p => [p[0]*sx, p[1]*sy])),
    bars: out,
    features: (m.features||[]).map(f => Object.assign({}, f, {
      box: f.box ? [f.box[0]*sx, f.box[1]*sy, f.box[2], f.box[3]*sx, f.box[4]*sy, f.box[5]] : null,
      center: f.center ? [f.center[0]*sx, f.center[1]*sy] : null,
    })),
    families: [], stats: {},
  };
}

// ---- build one panel's meshes into a group
const barMeshes = [];
function buildModelGroup(m) {
  const group = new THREE.Group();
  const kinds = {};

  const conc = new THREE.Mesh(
    new THREE.BoxGeometry(m.width, m.height, m.thickness),
    new THREE.MeshStandardMaterial({color:0x8a919d, transparent:true, opacity:0.13, depthWrite:false}));
  conc.position.set(m.width/2, m.height/2, m.thickness/2);
  group.add(conc);
  const eg = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(m.width, m.height, m.thickness)),
    new THREE.LineBasicMaterial({color:0x5c6470}));
  eg.position.copy(conc.position);
  group.add(eg);
  for (const lp of m.openings || []) {
    for (const z of [0, m.thickness]) {
      const pts = lp.map(p => new THREE.Vector3(p[0], p[1], z));
      pts.push(pts[0].clone());
      group.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({color:0x17becf})));
    }
  }

  // cast-in features
  for (const f of (m.features || [])) {
    const kg = kinds[f.kind] || (kinds[f.kind] = new THREE.Group());
    if (f.kind === "sleeve" && f.center) {
      const len = m.thickness;
      const tube = new THREE.Mesh(
        new THREE.CylinderGeometry(f.r, f.r, len, 16, 1, true),
        new THREE.MeshStandardMaterial({color:0x2ecc71, transparent:true, opacity:0.4,
          side:THREE.DoubleSide, roughness:0.6}));
      tube.position.set(f.center[0], f.center[1], len/2);
      tube.rotation.x = Math.PI/2;
      kg.add(tube);
      const nring = Math.max(3, Math.round(len/30));
      for (let i = 0; i <= nring; i++) {
        const ring = new THREE.Mesh(new THREE.TorusGeometry(f.r + 1.5, 1.3, 6, 24),
          new THREE.MeshStandardMaterial({color:0x2ecc71, roughness:0.6}));
        ring.position.set(f.center[0], f.center[1], (len * i) / nring);
        kg.add(ring);
      }
    } else if (f.box) {
      const [x0,y0,z0,x1,y1,z1] = f.box;
      const col = {corbel:0x9aa3b0, embed:0x7f8a99, anchor:0xf28e2b, loop:0xff9f43}[f.kind] || 0x999999;
      const geo = new THREE.BoxGeometry(Math.max(x1-x0,2), Math.max(y1-y0,2), Math.max(z1-z0,2));
      const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({color:col,
        transparent: f.kind === "corbel", opacity: f.kind === "corbel" ? 0.35 : 1.0, roughness:0.7}));
      mesh.position.set((x0+x1)/2, (y0+y1)/2, (z0+z1)/2);
      kg.add(mesh);
      const fe = new THREE.LineSegments(new THREE.EdgesGeometry(geo),
        new THREE.LineBasicMaterial({color:col}));
      fe.position.copy(mesh.position);
      kg.add(fe);
    }
  }

  // bars as cylinders between consecutive points
  for (const b of m.bars) {
    const color = DIA_COLORS[b.d] || 0x999999;
    const gkey = groupKeyOf(b);
    const kg = kinds[gkey] || (kinds[gkey] = new THREE.Group());
    const calibrated = b.z_src === "calibrated";
    const mat = new THREE.MeshStandardMaterial(calibrated
      ? {color, roughness:0.45, metalness:0.25, transparent:true, opacity:0.4}
      : {color, roughness:0.45, metalness:0.25});
    for (let i = 0; i + 1 < b.pts.length; i++) {
      const a = new THREE.Vector3(...b.pts[i]), c = new THREE.Vector3(...b.pts[i+1]);
      const len = a.distanceTo(c);
      if (len < 1) continue;
      const cyl = new THREE.Mesh(new THREE.CylinderGeometry(b.d/2, b.d/2, len, 8, 1), mat);
      cyl.position.copy(a).lerp(c, 0.5);
      cyl.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),
        new THREE.Vector3().subVectors(c, a).normalize());
      cyl.userData.bar = b; cyl.userData.mat = mat;
      kg.add(cyl);
      barMeshes.push(cyl);
    }
  }
  for (const k in kinds) group.add(kinds[k]);
  return {group, kinds};
}

// ---- scene composition (single or split original|modified)
let cur = null, resized = null, group = null;
const kindSets = {};
function fmtDims(m) { return `${Math.round(m.width)}×${Math.round(m.height)}×${Math.round(m.thickness)} mm`; }

function schedTable(s, title) {
  const rows = s.rows.map(r =>
    `<tr><td>T${r.d}</td><td>${r.n}</td><td>${(r.len/1000).toFixed(1)}</td>` +
    `<td>${(r.d*r.d/162).toFixed(3)}</td><td>${r.w.toFixed(2)}</td></tr>`).join("");
  return `<h1>${title}</h1><table>` +
    `<tr><th>Bar</th><th>Count</th><th>Length (m)</th><th>kg/m</th><th>Weight (kg)</th></tr>` +
    rows +
    `<tr class="total"><td>Total</td><td>${s.totN}</td><td>${(s.totL/1000).toFixed(1)}</td><td></td><td>${s.totW.toFixed(2)}</td></tr>` +
    `</table>`;
}

function renderSchedule() {
  const el = document.getElementById("schedule");
  const sA = schedOf(cur), cA = concreteOf(cur);
  if (!resized) {
    el.innerHTML = schedTable(sA, "Bar Schedule") +
      `<div class="dim" style="margin-top:5px">concrete ${cA.vol.toFixed(2)} m³ · ${cA.wt.toFixed(0)} kg — unit weight = d²/162 kg/m` +
      (sA.excluded ? `<br>${sA.excluded} lone unmatched pairing(s) excluded` : "") + `</div>`;
    return;
  }
  const sB = schedOf(resized), cB = concreteOf(resized);
  const dW = sB.totW - sA.totW, dC = cB.wt - cA.wt;
  const cls = v => v > 0 ? "delta-up" : "delta-down";
  const sgn = v => (v >= 0 ? "+" : "") + v.toFixed(1);
  el.innerHTML = schedTable(sB, `Bar Schedule — modified ${Math.round(resized.width)}×${Math.round(resized.height)}`) +
    `<table style="margin-top:7px">` +
    `<tr><th></th><th>original</th><th>modified</th><th>&Delta;</th></tr>` +
    `<tr><td>bars</td><td>${sA.totN}</td><td>${sB.totN}</td><td class="${cls(sB.totN-sA.totN)}">${sgn(sB.totN-sA.totN)}</td></tr>` +
    `<tr><td>steel (kg)</td><td>${sA.totW.toFixed(1)}</td><td>${sB.totW.toFixed(1)}</td><td class="${cls(dW)}">${sgn(dW)}</td></tr>` +
    `<tr><td>concrete (kg)</td><td>${cA.wt.toFixed(0)}</td><td>${cB.wt.toFixed(0)}</td><td class="${cls(dC)}">${sgn(dC)}</td></tr>` +
    `<tr class="total"><td>total (kg)</td><td>${(sA.totW+cA.wt).toFixed(0)}</td><td>${(sB.totW+cB.wt).toFixed(0)}</td>` +
    `<td class="${cls(dW+dC)}">${sgn(dW+dC)}</td></tr></table>` +
    `<div class="dim" style="margin-top:5px">unit weight = d²/162 kg/m · concrete ${CONCRETE_DENSITY} kg/m³</div>`;
}

function buildScene() {
  if (group) scene.remove(group);
  group = new THREE.Group();
  for (const k in kindSets) delete kindSets[k];
  barMeshes.length = 0;

  const L = buildModelGroup(cur);
  group.add(L.group);
  for (const k in L.kinds) (kindSets[k] || (kindSets[k] = [])).push(L.kinds[k]);
  let span = cur.width;
  if (resized) {
    const gap = Math.max(500, cur.width * 0.12);
    const R = buildModelGroup(resized);
    R.group.position.x = cur.width + gap;
    group.add(R.group);
    for (const k in R.kinds) (kindSets[k] || (kindSets[k] = [])).push(R.kinds[k]);
    span = cur.width + gap + resized.width;
  }
  scene.add(group);

  target.set(span/2, Math.max(cur.height, (resized||cur).height)/2, cur.thickness/2);
  sph.r = Math.max(span, cur.height) * (resized ? 1.0 : 1.4);
  applyCam();

  document.getElementById("hd").innerHTML = resized
    ? `${cur.name} — <span class="dim">left:</span> ${fmtDims(cur)} <span class="dim">right:</span> ${fmtDims(resized)}`
    : `${cur.name} — ${fmtDims(cur)} · ${cur.bars.length} bars`;
  const dias = [...new Set([...cur.bars, ...(resized ? resized.bars : [])].map(b => b.d))].sort((a,b)=>a-b);
  document.getElementById("legend").innerHTML = dias.map(d =>
    `<span style="margin-right:10px"><span class="sw" style="background:#${(DIA_COLORS[d]||0x999999).toString(16).padStart(6,"0")}"></span>T${d}</span>`).join("");
  const countOf = k => cur.bars.filter(b=>groupKeyOf(b)===k).length + (cur.features||[]).filter(f=>f.kind===k).length;
  document.getElementById("toggles").innerHTML = Object.keys(kindSets).map(k =>
    `<label><input type="checkbox" checked data-kind="${k}"> ${k} <span class="dim">(${countOf(k)})</span></label>`).join("");
  document.querySelectorAll("#toggles input").forEach(cb =>
    cb.addEventListener("change", () => kindSets[cb.dataset.kind].forEach(g => g.visible = cb.checked)));
  document.getElementById("families").innerHTML = resized ? "" : (cur.families || [])
    .filter(f => f.spacing)
    .map(f => {
      const lens = cur.bars
        .filter(b => b.kind === f.kind && b.d === f.d && Math.abs(b.pts[0][2] - f.z) <= 8)
        .map(barLen);
      const lo = Math.min(...lens) / 1000, hi = Math.max(...lens) / 1000;
      const lenTxt = hi - lo > 0.05 ? `${lo.toFixed(2)}–${hi.toFixed(2)} m` : `${hi.toFixed(2)} m`;
      return `<div class="dim">${f.kind === "v-mesh" ? "vert" : "horz"} T${f.d} @ <b style="color:#dde1e6">${f.spacing} mm</b> · ${f.count} bars · ${lenTxt} · z=${f.z}</div>`;
    })
    .join("");
  renderSchedule();
  clearMeasure();
}

// ---- click-to-measure between two bars
const raycaster = new THREE.Raycaster();
let picked = [];
let measureLine = null;
function barSegs(b) {
  const s = [];
  for (let i = 0; i + 1 < b.pts.length; i++)

function pickBar(ev) {
  const r = canvas.getBoundingClientRect();
  const ndc = new THREE.Vector2(((ev.clientX - r.left) / r.width) * 2 - 1, -((ev.clientY - r.top) / r.height) * 2 + 1);
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(barMeshes.filter(mh => mh.parent.visible), false);
  if (!hits.length) { clearMeasure(); return; }
  const bar = hits[0].object.userData.bar;
  if (picked.length === 2) clearMeasure();
  if (picked.length === 1 && picked[0].bar === bar) return;
  const meshes = barMeshes.filter(mh => mh.userData.bar === bar);
  meshes.forEach(mh => mh.userData.mat.emissive.setHex(0x2255ff));

      const [pa, pb] = closestSegSeg(s1[0], s1[1], s2[0], s2[1]);
      const d = pa.distanceTo(pb);
      if (d < bd) { bd = d; best = [pa, pb]; }
    }
    const clear = Math.max(0, bd - picked[0].bar.d/2 - picked[1].bar.d/2);
    document.getElementById("measure").textContent =
      `T${picked[0].bar.d} ↔ T${picked[1].bar.d}: ${bd.toFixed(0)} mm c/c (clear ${clear.toFixed(0)} mm)`;

  for (const b of m.bars)

// ---- BBS (bar bending schedule) grouping, matching the official sheet's
// row layout: bars are grouped by (diameter, rounded segment-length shape)
// regardless of internal "kind", since that's what the real schedule does --
// a v-mesh straight bar and a u-bar/tie/diagonal bar all become one of
// "Horizontal Bar" / "Vertical Bar" / "Diagonal Bar" rows with A-F segment
// columns, exactly like the printed PW-GF-*.pdf BBS sheets.
function segLens(pts) {
  const L = [];
  for (let i = 0; i + 1 < pts.length; i++) {
    const a = pts[i], c = pts[i+1];
    L.push(Math.hypot(c[0]-a[0], c[1]-a[1], c[2]-a[2]));
  }
  return L;
}
function shapeAxes(pts) {
  // the two axes with the most spread define the plane a bend is drawn in
  // (a tie bends in X-Z, a hairpin in Y-Z, a straight mesh bar has none) --
  // auto-detecting this keeps the mini bend diagram correct regardless of
  // the bar's kind or orientation.
  const vars = [0,1,2].map(ax => {
    const vals = pts.map(p => p[ax]);
    const mean = vals.reduce((a,b)=>a+b,0) / vals.length;
    return vals.reduce((a,v)=>a+(v-mean)*(v-mean), 0);
  });
  return [0,1,2].sort((a,b) => vars[b]-vars[a]).slice(0,2);
}
function distToSeg(p, a, b) {
  const ab = [b[0]-a[0], b[1]-a[1], b[2]-a[2]];
  const ap = [p[0]-a[0], p[1]-a[1], p[2]-a[2]];
  const abLen2 = ab[0]*ab[0]+ab[1]*ab[1]+ab[2]*ab[2];
  if (abLen2 < 1e-9) return Math.hypot(...ap);
  const t = (ap[0]*ab[0]+ap[1]*ab[1]+ap[2]*ab[2]) / abLen2;
  const proj = [a[0]+ab[0]*t, a[1]+ab[1]*t, a[2]+ab[2]*t];
  return Math.hypot(p[0]-proj[0], p[1]-proj[1], p[2]-proj[2]);
}
function rdpSimplify(pts, eps) {
  // Ramer-Douglas-Peucker: collapse a run of points onto its chord when
  // every point in the run deviates from that chord by less than eps.
  // Real bend vertices (tie/hairpin corners, ~90 degrees) deviate far more
  // than a small hook/fillet radius does, so this cleanly separates "one
  // more A/B/C segment" from "just how a curved bend got discretized".
  if (pts.length < 3) return pts.slice();
  let maxD = -1, idx = -1;
  for (let i = 1; i < pts.length-1; i++) {
    const d = distToSeg(pts[i], pts[0], pts[pts.length-1]);
    if (d > maxD) { maxD = d; idx = i; }
  }
  if (maxD > eps) {
    const left = rdpSimplify(pts.slice(0, idx+1), eps);
    const right = rdpSimplify(pts.slice(idx), eps);
    return left.slice(0, -1).concat(right);
  }

}
function simplifyShape(pts) {

  // show up as many small collinear-ish points -- collapse them to the
  // real bend vertices a human BBS would draw (25mm: comfortably above any
  // hook/dash noise, comfortably below every real A/B/C segment we produce).
  return rdpSimplify(pts, 25.0);
}
function bbsOf(m) {
  const SCHEDULABLE = new Set(["v-mesh","h-mesh","u-bar","tie","diagonal","shape","hook"]);
  const groups = {};
  for (const b0 of m.bars) {
    if (!SCHEDULABLE.has(b0.kind)) continue;
    const b = Object.assign({}, b0, {pts: simplifyShape(b0.pts)});
    const segs = segLens(b.pts);
    if (!segs.length) continue;
    const xs = b.pts.map(p=>p[0]), ys = b.pts.map(p=>p[1]);
    const spanX = Math.max(...xs)-Math.min(...xs), spanY = Math.max(...ys)-Math.min(...ys);
    const vertical = spanY >= spanX;
    const desc = b.kind === "diagonal" ? "Diagonal Bar" : (vertical ? "Vertical Bar" : "Horizontal Bar");
    const shapeKey = segs.map(s => Math.round(s/20)*20).join(",");
    const key = b.d + "|" + shapeKey;
    const perpAxis = vertical ? 0 : 1;
    const pos = b.pts.reduce((a,p)=>a+p[perpAxis],0) / b.pts.length;
    const g = groups[key] || (groups[key] = {d: b.d, segs, desc, pts0: b.pts, bars: []});
    g.bars.push({pos, calibrated: b.z_src === "calibrated"});
  }
  const rows = [];
  for (const key in groups) {
    const g = groups[key];
    const n = g.bars.length;
    const positions = g.bars.map(x => x.pos).sort((a,b)=>a-b);
    let spacing = null;
    if (n >= 3) {
      const gaps = [];
      for (let i = 1; i < positions.length; i++) {
        const d = positions[i] - positions[i-1];
        if (d > 10) gaps.push(d);
      }
      if (gaps.length) {
        const sorted = gaps.slice().sort((a,b)=>a-b);
        const med = sorted[Math.floor(sorted.length/2)];
        if (gaps.every(g2 => Math.abs(g2-med) < Math.max(med*0.25, 15))) spacing = Math.round(med/5)*5;
      }
    }
    const segsM = g.segs.map(s => s/1000);
    const length = segsM.reduce((a,b)=>a+b, 0);
    const totLen = length * n;
    const uw = g.d*g.d/162;
    const totW = totLen * uw;
    const nCal = g.bars.filter(x => x.calibrated).length;
    rows.push({
      desc: g.desc, segs: segsM, spacing, dia: g.d, nos: n,
      length, totLen, uw, totW,
      remarks: nCal ? (nCal === n ? "calibrated" : `${nCal}/${n} calibrated`) : "",
      pts0: g.pts0,
    });
  }
  rows.sort((a,b) => a.dia - b.dia || b.totW - a.totW);
  rows.forEach((r,i) => r.sno = i+1);
  return {rows, totW: rows.reduce((a,r)=>a+r.totW, 0)};
}

// ---- minimal single-page-capable PDF writer (no external deps: PDF text
// objects + line-drawing operators are plain ASCII, so a hand-rolled writer
// avoids vendoring a whole PDF library for one table).
function escPdf(s) { return String(s).replace(/\\/g,"\\\\").replace(/\(/g,"\\(").replace(/\)/g,"\\)"); }
function buildPDF(contentStreams, pw, ph) {
  const N = contentStreams.length;
  const fontReg = 3, fontBold = 4;
  const contentIds = contentStreams.map((_,i) => 5+i);
  const pageIds = contentStreams.map((_,i) => 5+N+i);
  const objs = {};
  objs[1] = `<< /Type /Catalog /Pages 2 0 R >>`;
  objs[2] = `<< /Type /Pages /Kids [${pageIds.map(id=>id+" 0 R").join(" ")}] /Count ${N} >>`;
  objs[fontReg] = `<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica >>`;
  objs[fontBold] = `<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>`;
  contentStreams.forEach((c, i) => {
    objs[contentIds[i]] = `<< /Length ${c.length} >>\nstream\n${c}\nendstream`;
    objs[pageIds[i]] = `<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pw} ${ph}] ` +
      `/Resources << /Font << /F1 ${fontReg} 0 R /F2 ${fontBold} 0 R >> >> /Contents ${contentIds[i]} 0 R >>`;
  });
  const maxId = Math.max(2, fontReg, fontBold, ...contentIds, ...pageIds);
  let out = "%PDF-1.4\n";
  const offsets = new Array(maxId+1).fill(0);
  for (let id = 1; id <= maxId; id++) {
    offsets[id] = out.length;
    out += `${id} 0 obj\n${objs[id]}\nendobj\n`;
  }
  const xrefStart = out.length;
  out += `xref\n0 ${maxId+1}\n0000000000 65535 f \n`;
  for (let id = 1; id <= maxId; id++) out += String(offsets[id]).padStart(10,"0") + " 00000 n \n";
  out += `trailer\n<< /Size ${maxId+1} /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF`;
  return out;
}

const BBS_COLS = [
  ["S.No", 22], ["Description", 78], ["Bar Shape", 70], ["Spacing(mm)", 58], ["Dia", 26], ["Nos.", 30],
  ["A", 31], ["B", 31], ["C", 31], ["D", 31], ["E", 31], ["F", 31],
  ["Length(m)", 48], ["Tot.Length(m)", 58], ["Unit Wt(Kg/m)", 53], ["Tot.Weight(Kg)", 58], ["Remarks", 48],
];
function bbsPdfOf(m) {
  const {rows, totW} = bbsOf(m);
  const PW = 792, PH = 612, marginL = 28, marginB = 30, rowH = 24, headH = 22, titleH = 58;
  const colX = []; { let x = marginL; for (const [,w] of BBS_COLS) { colX.push(x); x += w; } }
  const tableRight = colX[colX.length-1] + BBS_COLS[BBS_COLS.length-1][1];
  const rowsPerPage = Math.max(1, Math.floor((PH - titleH - marginB - headH) / rowH));
  const pageCount = Math.max(1, Math.ceil(rows.length / rowsPerPage));
  const pages = [];
  for (let p = 0; p < pageCount; p++) {
    const pageRows = rows.slice(p*rowsPerPage, (p+1)*rowsPerPage);
    const isLast = p === pageCount - 1;
    let s = "";
    const text = (x,y,size,str,bold) =>
      { s += `BT /${bold?"F2":"F1"} ${size} Tf 1 0 0 1 ${x.toFixed(2)} ${y.toFixed(2)} Tm (${escPdf(str)}) Tj ET\n`; };
    const ctext = (ci, y, size, str, bold) => {
      const w = BBS_COLS[ci][1], cx = colX[ci];
      const tw = String(str).length * size * 0.5;
      text(cx + Math.max(2,(w-tw)/2), y, size, str, bold);
    };
    const hline = (y, x0, x1) => { s += `${x0.toFixed(2)} ${y.toFixed(2)} m ${x1.toFixed(2)} ${y.toFixed(2)} l S\n`; };
    const vline = (x, y0, y1) => { s += `${x.toFixed(2)} ${y0.toFixed(2)} m ${x.toFixed(2)} ${y1.toFixed(2)} l S\n`; };

    text(marginL, PH-30, 13, `${m.name} -- Bar Bending Schedule` + (pageCount>1 ? ` (page ${p+1}/${pageCount})` : ""), true);
    text(marginL, PH-44, 8, `${Math.round(m.width)}x${Math.round(m.height)}x${Math.round(m.thickness)} mm ` +
      `- generated ${new Date().toLocaleDateString()} - reconstructed from shop drawing (unit wt = d^2/162 kg/m)`, false);

    let y = PH - titleH;
    const headY = y;
    for (let ci=0; ci<BBS_COLS.length; ci++) ctext(ci, headY - 14, 6.5, BBS_COLS[ci][0], true);
    y -= headH;
    hline(headY+6, marginL, tableRight);
    hline(y+6, marginL, tableRight);

    for (const r of pageRows) {
      const cells = [
        String(r.sno), r.desc, "", r.spacing ? (r.spacing+"c/c") : "-", String(r.dia), String(r.nos),
        ...Array.from({length:6}, (_,i) => r.segs[i] !== undefined ? r.segs[i].toFixed(2) : "-"),
        r.length.toFixed(3), r.totLen.toFixed(2), r.uw.toFixed(3), r.totW.toFixed(3), r.remarks,
      ];
      for (let ci=0; ci<cells.length; ci++) if (ci !== 1 && ci !== 2) ctext(ci, y-16, 6.5, cells[ci], false);
      text(colX[1]+3, y-16, 6.5, r.desc, false);
      // mini bend-shape diagram, traced from the group's own real geometry
      const bx = colX[2], bw = BBS_COLS[2][1], by = y - rowH + 4, bh = rowH - 8;
      const pts = r.pts0;
      if (pts && pts.length > 1) {
        const [ax0, ax1] = shapeAxes(pts);
        const us = pts.map(p => p[ax0]), vs = pts.map(p => p[ax1]);
        const u0=Math.min(...us), u1=Math.max(...us), v0=Math.min(...vs), v1=Math.max(...vs);
        const du = Math.max(u1-u0, 1), dv = Math.max(v1-v0, 1);
        const pad = 4, sc = Math.min((bw-2*pad)/du, (bh-2*pad)/dv);
        const mapped = pts.map(p => [bx + bw/2 - (u0+u1)/2*sc + p[ax0]*sc, by + bh/2 - (v0+v1)/2*sc + p[ax1]*sc]);
        const LETTERS = ["A","B","C","D","E","F"];
        for (let i=0; i+1<mapped.length; i++) {
          const [px1,py1] = mapped[i], [px2,py2] = mapped[i+1];
          s += `${px1.toFixed(2)} ${py1.toFixed(2)} m ${px2.toFixed(2)} ${py2.toFixed(2)} l S\n`;
          if (i < LETTERS.length) {
            const mx = (px1+px2)/2, my = (py1+py2)/2;
            const ddx = px2-px1, ddy = py2-py1, dlen = Math.hypot(ddx,ddy) || 1;
            const nx = -ddy/dlen, ny = ddx/dlen; // unit normal, offset the label off the line
            text(mx + nx*7 - 1.6, my + ny*7 - 1.6, 5, LETTERS[i], false);
          }
        }
      }
      y -= rowH;
      hline(y+rowH, marginL, tableRight);
    }
    hline(y, marginL, tableRight);
    for (let ci=0; ci<=BBS_COLS.length; ci++)
      vline(ci < BBS_COLS.length ? colX[ci] : tableRight, y, headY+6);
    if (isLast) {
      text(colX[1]+3, marginB+4, 8, "Total (Kg)", true);
      ctext(15, marginB+4, 8, totW.toFixed(3), true);
    }
    pages.push(s);
  }
  return buildPDF(pages, PW, PH);
}

function download(name, text, mime) {
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([text], {type: mime}));
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 5000);
}

// ---- tools
const w2in = document.getElementById("w2"), h2in = document.getElementById("h2");
document.getElementById("applyBtn").onclick = () => {
  const W2 = Math.min(30000, Math.max(300, +w2in.value || cur.width));
  const H2 = Math.min(30000, Math.max(300, +h2in.value || cur.height));
  resized = (Math.abs(W2-cur.width) < 1 && Math.abs(H2-cur.height) < 1) ? null : resizeModel(cur, W2, H2);
  buildScene();
};
document.getElementById("resetBtn").onclick = () => {
  resized = null;
  w2in.value = Math.round(cur.width); h2in.value = Math.round(cur.height);
  buildScene();
};
document.getElementById("dxfBtn").onclick = () => {
  const m = resized || cur;
  download(`${m.name}_${Math.round(m.width)}x${Math.round(m.height)}.dxf`, dxfOf(m), "image/vnd.dxf");
  document.getElementById("dlNote").textContent = resized ? "exported: modified geometry" : "exported: original geometry";
};
document.getElementById("repBtn").onclick = () => {
  const m = resized || cur;
  download(`${m.name}_report_${Math.round(m.width)}x${Math.round(m.height)}.html`, reportOf(), "text/html");
};
document.getElementById("bbsBtn").onclick = () => {
  const m = resized || cur;
  download(`${m.name}_BBS_${Math.round(m.width)}x${Math.round(m.height)}.pdf`, bbsPdfOf(m), "application/pdf");
  document.getElementById("dlNote").textContent = resized ? "BBS exported: modified geometry" : "BBS exported: original geometry";
};

// ---- panel switcher
const bar = document.getElementById("panelbar");
MODELS.forEach((m, i) => {
  const b = document.createElement("button");
  b.textContent = m.name;
  b.onclick = () => {
    document.querySelectorAll("#panelbar button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    cur = m; resized = null;
    w2in.value = Math.round(m.width); h2in.value = Math.round(m.height);
    buildScene();
  };
  bar.appendChild(b);
  const want = decodeURIComponent(location.hash.slice(1));
  if (want ? m.name === want : i === 0) b.onclick();
});
// ?w=&h= applies a resize on load (shareable / testable)
const qp = new URLSearchParams(location.search);
if (qp.get("w") || qp.get("h")) {
  w2in.value = qp.get("w") || Math.round(cur.width);
  h2in.value = qp.get("h") || Math.round(cur.height);
  document.getElementById("applyBtn").onclick();
}

function resize() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);
resize(); applyCam();
renderer.setAnimationLoop(() => renderer.render(scene, camera));
</script>
